<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PhotoBooth | Capture & Connect</title>
    <meta name="description" content="Capture stunning photobooth-style prints and connect with friends anywhere in the world." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <nav id="main-nav" class="hidden">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div class="logo" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800;">
            <span class="gradient-text">PhotoBooth</span>
          </div>
          <div class="nav-links">
            <a href="#" data-link="dashboard" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Dashboard</a>
            <a href="#" data-link="friends" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Friends</a>
            <a href="#" data-link="profile" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Profile</a>
            <a href="#" id="logout-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem; border-color: var(--accent);">Logout</a>
          </div>
          <!-- Mobile Menu Toggle -->
          <button id="menu-toggle" class="btn btn-secondary" style="display: block; padding: 0.5rem;">
            <i data-lucide="menu"></i>
          </button>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main id="content" class="container">
        <!-- Views will be injected here -->
        <div class="flex-center" style="min-height: 80vh;">
          <div class="loader"></div>
        </div>
      </main>

      <!-- Toast Notifications -->
      <div id="notification-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;"></div>
    </div>

    <!-- Templates -->
    <template id="view-login">
      <div class="fade-in flex-center" style="min-height: 90vh;">
        <div class="glass-card" style="width: 100%; max-width: 400px;">
          <h1 class="mb-1" style="font-family: 'Outfit', sans-serif;">Welcome Back</h1>
          <p class="text-muted mb-2">Sign in to start capturing memories.</p>
          
          <button id="google-login" class="btn btn-primary" style="width: 100%; margin-bottom: 1.5rem;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" style="margin-right: 10px;" />
            Continue with Google
          </button>

          <div style="display: flex; align-items: center; margin-bottom: 1.5rem;">
            <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
            <span style="padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem;">OR</span>
            <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
          </div>

          <form id="login-form">
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
              <label>Password</label>
              <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
          </form>
          <p class="mt-1 text-muted" style="font-size: 0.9rem; text-align: center;">
            Don't have an account? <a href="#" data-link="register" style="color: var(--primary); font-weight: 600;">Register</a>
          </p>
        </div>
      </div>
    </template>

    <template id="view-dashboard">
      <div class="fade-in mt-2">
        <header class="mb-2">
          <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem;">Hello, <span id="user-name">Explorer</span>!</h1>
          <p class="text-muted">Ready for your next photoshoot?</p>
        </header>

        <div class="grid-2">
          <div class="glass-card" style="display: flex; flex-direction: column; justify-content: space-between; min-height: 250px; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));">
            <div>
              <h2 class="mb-1">Start Booth</h2>
              <p class="text-muted">Enter the booth to capture 4 unique poses in a classic strip or postcard style.</p>
            </div>
            <button data-link="booth" class="btn btn-primary mt-1">Open Camera</button>
          </div>

          <div class="glass-card" style="display: flex; flex-direction: column; justify-content: space-between; min-height: 250px;">
            <div>
              <h2 class="mb-1">Recent Captures</h2>
              <p class="text-muted">Your latest memories will appear here.</p>
            </div>
            <div id="recent-photos" class="flex-center" style="height: 100px; border: 2px dashed var(--border); border-radius: 12px;">
              <span class="text-muted">No photos yet</span>
            </div>
          </div>
        </div>
        
        <div class="mt-2">
          <h2 class="mb-1">Active Friends</h2>
          <div id="friends-mini-list" class="flex-center" style="padding: 2rem; background: var(--bg-card); border-radius: 20px;">
             <p class="text-muted">Follow some friends to see them here.</p>
          </div>
        </div>

        <div class="mt-2 p-1 glass-card" style="font-size: 0.85rem; color: var(--text-muted);">
            <h3 class="mb-1" style="color: var(--text-main);">Booth Footprints</h3>
            <p>Physical booth requirements for your events:</p>
            <ul style="padding-left: 1.5rem; margin-top: 0.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.5rem;">
                <li><strong>Enclosed:</strong> ~15-20 sq.ft</li>
                <li><strong>Open-Air:</strong> ~10-15 sq.ft</li>
                <li><strong>360-Degree:</strong> Up to 100 sq.ft</li>
                <li><strong>Common Sizes:</strong> 5"x7", 6"x8"</li>
            </ul>
        </div>
      </div>
    </template>

    <template id="view-profile">
      <div class="fade-in mt-2 flex-center" style="flex-direction: column;">
        <div class="glass-card" style="width: 100%; max-width: 500px; text-align: center;">
            <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                <img id="profile-img" src="https://via.placeholder.com/150" style="width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--primary); padding: 5px; object-fit: cover;">
                <div style="position: absolute; bottom: 10px; right: 10px; background: var(--secondary); color: white; padding: 0.5rem; border-radius: 50%; box-shadow: var(--shadow-glow);">
                    <i data-lucide="camera" style="width: 16px; height: 16px;"></i>
                </div>
            </div>
            <h1 id="profile-name" style="font-family: 'Outfit', sans-serif; margin-bottom: 0.5rem;">User Name</h1>
            <p id="profile-email" class="text-muted mb-2">user@example.com</p>
            
            <div class="glass-card" style="background: rgba(0,0,0,0.2); padding: 1rem; text-align: left; margin-bottom: 1.5rem;">
                <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
                    <i data-lucide="map-pin" style="color: var(--secondary);"></i>
                    <span id="profile-location">Detecting location...</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <i data-lucide="heart" style="color: var(--accent);"></i>
                    <span>Member since April 2026</span>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%;">Edit Profile</button>
        </div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
