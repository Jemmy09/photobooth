<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PhotoBooth | Capture & Connect</title>
    <meta name="description" content="Capture stunning photobooth-style prints and connect with friends anywhere in the world." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Premium Navigation Bar -->
      <nav id="main-nav" class="hidden">
        <div class="nav-container glass-panel">
          <!-- Logo -->
          <div class="nav-logo" style="cursor: pointer;" data-link="dashboard">
            <div class="logo-icon-wrapper">
              <i data-lucide="camera"></i>
            </div>
            <span class="gradient-text font-outfit logo-text">PhotoBooth</span>
          </div>

          <!-- Desktop & Mobile Links -->
          <div class="nav-links">
            <a href="#" data-link="dashboard" class="nav-item active" title="Dashboard">
              <i data-lucide="layout-grid"></i>
              <span class="nav-label">Dashboard</span>
            </a>
            <a href="#" data-link="friends" class="nav-item" title="Friends">
              <i data-lucide="users"></i>
              <span class="nav-label">Friends</span>
            </a>
            <a href="#" data-link="profile" class="nav-item" title="Profile">
              <i data-lucide="user"></i>
              <span class="nav-label">Profile</span>
            </a>
            <a href="#" data-link="notifications" class="nav-item notification-trigger" id="nav-notifications-btn" title="Notifications">
              <i data-lucide="bell"></i>
              <span class="nav-label">Alerts</span>
              <span id="nav-notification-badge" class="notification-badge hidden"></span>
            </a>
          </div>

          <!-- Actions -->
          <div class="nav-actions">
            <button id="logout-btn" class="btn-icon logout-btn" title="Sign Out">
              <i data-lucide="log-out"></i>
            </button>
          </div>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main id="content" class="container">
        <!-- Views will be injected here -->
        <div class="flex-center" style="min-height: 80vh;">
          <div class="loader"></div>
        </div>
      </main>

      <!-- Toast Notifications -->
      <div id="notification-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;"></div>
    </div>

    <!-- Templates -->
    <template id="view-login">
      <div class="fade-in flex-center" style="min-height: 90vh; padding: 1rem;">
        <div class="glass-card" style="width: 100%; max-width: 420px; position: relative; overflow: hidden;">
          <!-- Decorative background glow -->
          <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary-glow); border-radius: 50%; filter: blur(40px); z-index: 0;"></div>
          
          <div style="position: relative; z-index: 1;">
            <div style="text-align: center; margin-bottom: 2rem;">
              <div class="logo mb-1" style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800;">
                <span class="gradient-text">PhotoBooth</span>
              </div>
              <h1 class="mb-1" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem;">Welcome Back</h1>
              <p class="text-muted">Sign in to start capturing memories.</p>
            </div>
            
            <button id="google-login" class="btn" style="width: 100%; margin-bottom: 1.5rem; background: #ffffff; color: #3c4043; border: 1px solid #dadce0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); font-weight: 500; display: flex; justify-content: center; align-items: center; gap: 12px; transition: background-color 0.2s, box-shadow 0.2s;">
              <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
              Sign in with Google
            </button>

            <div style="display: flex; align-items: center; margin-bottom: 1.5rem;">
              <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
              <span style="padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">or</span>
              <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
            </div>

            <form id="login-form">
              <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="name@example.com" required>
              </div>
              <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-primary" id="login-submit-btn" style="width: 100%; position: relative;">
                <span>Sign In</span>
                <div class="loader-small hidden" style="position: absolute; right: 1rem; width: 16px; height: 16px;"></div>
              </button>
            </form>
            <p class="mt-2 text-muted" style="font-size: 0.9rem; text-align: center;">
              Don't have an account? <a href="#" data-link="register" style="color: var(--primary); font-weight: 600; text-decoration: none; transition: color 0.2s;">Create one</a>
            </p>
          </div>
        </div>
      </div>
    </template>

    <template id="view-register">
      <div class="fade-in flex-center" style="min-height: 90vh; padding: 1rem;">
        <div class="glass-card" style="width: 100%; max-width: 420px; position: relative; overflow: hidden;">
          <!-- Decorative background glow -->
          <div style="position: absolute; bottom: -50px; left: -50px; width: 150px; height: 150px; background: var(--secondary-glow); border-radius: 50%; filter: blur(40px); z-index: 0;"></div>
          
          <div style="position: relative; z-index: 1;">
            <div style="text-align: center; margin-bottom: 2rem;">
              <div class="logo mb-1" style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800;">
                <span class="gradient-text">PhotoBooth</span>
              </div>
              <h1 class="mb-1" style="font-family: 'Outfit', sans-serif; font-size: 1.5rem;">Create Account</h1>
              <p class="text-muted">Join to share memories with friends.</p>
            </div>

            <form id="register-form">
              <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="register-name" placeholder="John Doe" required>
              </div>
              <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="register-email" placeholder="name@example.com" required>
              </div>
              <div class="input-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="••••••••" minlength="6" required>
              </div>
              <button type="submit" class="btn btn-primary" id="register-submit-btn" style="width: 100%; margin-top: 0.5rem; position: relative;">
                <span>Sign Up</span>
                <div class="loader-small hidden" style="position: absolute; right: 1rem; width: 16px; height: 16px;"></div>
              </button>
            </form>
            <p class="mt-2 text-muted" style="font-size: 0.9rem; text-align: center;">
              Already have an account? <a href="#" data-link="login" style="color: var(--secondary); font-weight: 600; text-decoration: none; transition: color 0.2s;">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </template>

    <template id="view-dashboard">
      <div class="fade-in mt-2">
        <header class="mb-2">
          <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem;">Hello, <span id="user-name">Explorer</span>!</h1>
          <p class="text-muted">Ready for your next photoshoot?</p>
        </header>

        <div class="grid-2">
          <div class="glass-card" style="display: flex; flex-direction: column; justify-content: space-between; min-height: 250px; background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));">
            <div>
              <h2 class="mb-1">Start Booth</h2>
              <p class="text-muted">Enter the booth to capture 4 unique poses in a classic strip or postcard style.</p>
            </div>
            <button data-link="booth" class="btn btn-primary mt-1">Open Camera</button>
          </div>

          <div class="glass-card" style="display: flex; flex-direction: column; justify-content: space-between; min-height: 250px;">
            <div>
              <h2 class="mb-1">Recent Captures</h2>
              <p class="text-muted">Your latest memories will appear here.</p>
            </div>
            <div id="recent-photos" class="flex-center" style="height: 100px; border: 2px dashed var(--border); border-radius: 12px;">
              <span class="text-muted">No photos yet</span>
            </div>
          </div>
        </div>
        
        <div class="mt-2">
          <h2 class="mb-1">Active Friends</h2>
          <div id="friends-mini-list" class="flex-center" style="padding: 2rem; background: var(--bg-card); border-radius: 20px;">
             <p class="text-muted">Follow some friends to see them here.</p>
          </div>
        </div>

        <div class="mt-2 p-1 glass-card" style="font-size: 0.85rem; color: var(--text-muted);">
            <h3 class="mb-1" style="color: var(--text-main);">Booth Footprints</h3>
            <p>Physical booth requirements for your events:</p>
            <ul style="padding-left: 1.5rem; margin-top: 0.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.5rem;">
                <li><strong>Enclosed:</strong> ~15-20 sq.ft</li>
                <li><strong>Open-Air:</strong> ~10-15 sq.ft</li>
                <li><strong>360-Degree:</strong> Up to 100 sq.ft</li>
                <li><strong>Common Sizes:</strong> 5"x7", 6"x8"</li>
            </ul>
        </div>
      </div>
    </template>

    <template id="view-profile">
      <div class="fade-in mt-2 flex-center" style="flex-direction: column;">
        <div class="glass-card" style="width: 100%; max-width: 600px; padding: 2.5rem;">
            <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                <div class="profile-avatar-container" style="position: relative; width: 160px; height: 160px;">
                    <div id="profile-avatar-wrapper" style="width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--primary); padding: 4px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <img id="profile-img" src="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                        <div id="profile-icon-fallback" style="color: var(--text-muted); opacity: 0.5;">
                            <i data-lucide="user" style="width: 80px; height: 80px;"></i>
                        </div>
                    </div>
                    <label for="profile-upload" style="position: absolute; bottom: 8px; right: 8px; background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--bg-dark); box-shadow: var(--shadow-glow); transition: var(--transition-fast); z-index: 10;">
                        <i data-lucide="camera" style="width: 18px; height: 18px;"></i>
                        <input type="file" id="profile-upload" hidden accept="image/*" onchange="handleProfileUpload(this)">
                    </label>
                </div>
            </div>
            
            <h1 id="profile-name" style="font-family: 'Outfit', sans-serif; font-size: 2rem; margin-bottom: 0.25rem;">User Name</h1>
            <p id="profile-email" class="text-muted mb-2">user@example.com</p>
            
            <div style="display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--glass-border);">
                <div style="text-align: center;">
                    <p id="stats-friends" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">0</p>
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Friends</p>
                </div>
                <div style="text-align: center;">
                    <p id="stats-followers" style="font-size: 1.5rem; font-weight: 800; color: var(--secondary);">0</p>
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Followers</p>
                </div>
                <div style="text-align: center;">
                    <p id="stats-mutual" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">0</p>
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Mutual</p>
                </div>
            </div>

            <div class="glass-card" style="background: rgba(0,0,0,0.2); padding: 1.25rem; text-align: left; margin-bottom: 2rem; border-radius: 16px;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem;">
                    <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(6, 182, 212, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="map-pin" style="width: 16px; height: 16px; color: var(--secondary);"></i>
                    </div>
                    <div>
                        <p style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Current Location</p>
                        <span id="profile-location" style="font-weight: 500;">Detecting location...</span>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(139, 92, 246, 0.1); display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="calendar" style="width: 16px; height: 16px; color: var(--primary);"></i>
                    </div>
                    <div>
                        <p style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Member Since</p>
                        <span id="profile-joined" style="font-weight: 500;">April 2026</span>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <button onclick="openEditModal()" class="btn btn-secondary" style="width: 100%; border-radius: 12px;">
                    <i data-lucide="edit-3" style="width: 16px; height: 16px;"></i> Edit Profile
                </button>
                <button onclick="handleLogout()" class="btn btn-icon" style="width: 100%; height: auto; padding: 0.875rem; border-radius: 12px; background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2); color: var(--accent);">
                    <i data-lucide="log-out" style="width: 16px; height: 16px;"></i> Sign Out
                </button>
            </div>
        </div>
      </div>

      <!-- Edit Profile Modal -->
      <div id="edit-modal" class="modal-overlay hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1.5rem;">
        <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2rem;">
            <h2 class="mb-2">Edit Profile</h2>
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="edit-name" placeholder="Your Name">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem;">
                <button onclick="closeEditModal()" class="btn btn-secondary">Cancel</button>
                <button onclick="saveProfileChanges()" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
      </div>
    </template>

    <template id="view-notifications">
      <div class="fade-in mt-2 flex-center" style="flex-direction: column;">
        <div class="glass-card" style="width: 100%; max-width: 600px;">
          <header class="mb-2" style="display: flex; align-items: center; justify-content: space-between;">
            <div>
              <h1 style="font-family: 'Outfit', sans-serif;">Notifications</h1>
              <p class="text-muted" style="font-size: 0.9rem;">Stay updated with your friends</p>
            </div>
            <button id="clear-notifications" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Clear All</button>
          </header>
          
          <div id="notifications-list" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="flex-center" style="height: 150px; border: 2px dashed var(--border); border-radius: 12px;">
              <p class="text-muted">No new notifications</p>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
