<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PhotoBooth | Capture & Connect</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Capture stunning photobooth-style prints and connect with friends anywhere in the world." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Premium Floating Navigation -->
      <nav id="main-nav" class="hidden">
        <div class="container">
          <div class="nav-inner">
            <div class="logo" style="display: flex; align-items: center; gap: 0.5rem;">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--primary-glow);">
                    <i data-lucide="camera" style="width: 18px; color: white;"></i>
                </div>
                <span class="gradient-text" style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.25rem;">PhotoBooth</span>
            </div>
            
            <div style="display: flex; gap: 0.5rem;">
                <a href="#" data-link="dashboard" class="nav-item">
                    <i data-lucide="layout-grid"></i>
                    <span class="nav-links-text">Dashboard</span>
                </a>
                <a href="#" data-link="friends" class="nav-item">
                    <i data-lucide="users"></i>
                    <span class="nav-links-text">Friends</span>
                </a>
                <a href="#" data-link="profile" class="nav-item">
                    <i data-lucide="user"></i>
                    <span class="nav-links-text">Profile</span>
                </a>
                <a href="#" data-link="notifications" class="nav-item" style="position: relative;">
                    <i data-lucide="bell"></i>
                    <span class="nav-links-text">Alerts</span>
                    <span id="nav-notification-badge" class="badge hidden"></span>
                </a>
                <div style="width: 1px; height: 24px; background: var(--glass-border); margin: auto 0.5rem;"></div>
                <button id="logout-btn" class="nav-item" style="background: none; border: none; cursor: pointer;">
                    <i data-lucide="log-out"></i>
                    <span class="nav-links-text">Exit</span>
                </button>
            </div>
          </div>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main id="content" class="container">
        <div class="flex-center" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
          <div class="loader" style="width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
      </main>

      <!-- Toast Notifications -->
      <div id="notification-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 2000; display: flex; flex-direction: column-reverse; gap: 0.5rem; align-items: flex-end;"></div>
    </div>

    <!-- View Templates -->
    <template id="view-login">
      <div class="fade-in" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 420px; text-align: center;">
          <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Get Started</h1>
          <p class="text-muted" style="margin-bottom: 2rem;">The world's most premium digital photobooth.</p>
          
          <button id="google-login" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 16px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" />
            Continue with Google
          </button>

          <div style="display: flex; align-items: center; margin: 1.5rem 0;">
            <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
            <span style="padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem;">SECURE AUTH</span>
            <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
          </div>

          <form id="login-form" style="text-align: left; display: flex; flex-direction: column; gap: 1rem;">
            <div>
              <label style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">EMAIL ADDRESS</label>
              <input type="email" class="search-input" style="padding: 1rem; border-radius: 12px;" placeholder="name@example.com" required>
            </div>
            <div>
              <label style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">PASSWORD</label>
              <input type="password" class="search-input" style="padding: 1rem; border-radius: 12px;" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-secondary" style="width: 100%; padding: 1rem; border-radius: 12px;">Sign In to PhotoBooth</button>
          </form>
        </div>
      </div>
    </template>

    <template id="view-dashboard">
      <div class="fade-in">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2.5rem;">Hi, <span id="user-name">there</span>!</h1>
                <p class="text-muted">Ready to capture some memories today?</p>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 0.7rem; color: #10b981; font-weight: 700; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2);">v1.2.2 STABLE</span>
            </div>
        </div>

        <div class="user-grid" style="grid-template-columns: 1.5fr 1fr; margin-bottom: 2rem;">
          <div class="glass-card" style="display: flex; flex-direction: column; justify-content: center; min-height: 280px; background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1)); border: 1px solid rgba(255,255,255,0.15);">
            <h2 style="font-size: 1.75rem; margin-bottom: 1rem;">Start a Session</h2>
            <p class="text-muted" style="margin-bottom: 2rem; max-width: 400px;">Capture 4 high-fidelity poses and create a professional photostrip to share with your friends.</p>
            <button data-link="booth" class="btn btn-primary" style="align-self: flex-start; padding: 1rem 2rem; border-radius: 16px;">
                <i data-lucide="camera"></i> Enter PhotoBooth
            </button>
          </div>

          <div class="glass-card" style="display: flex; flex-direction: column;">
            <h3 style="margin-bottom: 1.5rem;">Recent Print</h3>
            <div id="recent-photos" style="flex: 1; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--glass-border); border-radius: 16px; overflow: hidden;">
              <p class="text-muted" style="font-size: 0.85rem;">No recent captures</p>
            </div>
          </div>
        </div>
        
        <div class="glass-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>Active Friends</h3>
            <button data-link="friends" class="btn btn-secondary" style="padding: 0.4rem 1rem; font-size: 0.8rem;">View All</button>
          </div>
          <div id="friends-mini-list" style="display: flex; gap: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
             <p class="text-muted">Invite friends to see them here.</p>
          </div>
        </div>
      </div>
    </template>

    <template id="view-friends">
      <div class="fade-in">
        <h1 style="margin-bottom: 0.5rem;">Community</h1>
        <p class="text-muted" style="margin-bottom: 2rem;">Discover and connect with other photographers.</p>

        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="friend-search" class="search-input" placeholder="Search by name or email address...">
        </div>

        <div style="margin-bottom: 3rem;">
            <h3 style="margin-bottom: 1rem; color: var(--primary);">Discover</h3>
            <div id="search-results" class="user-grid">
                <!-- Search results injected here -->
            </div>
        </div>

        <div>
            <h3 style="margin-bottom: 1rem; color: var(--secondary);">My Friends</h3>
            <div id="friends-list" class="user-grid">
                <!-- Friends list injected here -->
            </div>
        </div>
      </div>
    </template>

    <template id="view-profile">
      <div class="fade-in profile-hero">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto; position: relative; overflow: hidden;">
            <!-- Subtle background accent -->
            <div style="position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: var(--primary); filter: blur(100px); opacity: 0.1;"></div>
            
            <div class="profile-avatar-container" style="cursor: pointer;" onclick="document.getElementById('profile-upload').click()">
                <img id="profile-img" src="" class="profile-avatar">
                <div id="profile-icon-fallback" class="profile-avatar" style="display: flex; align-items: center; justify-content: center; background: var(--glass);">
                    <i data-lucide="user" style="width: 40px; height: 40px; color: var(--text-muted);"></i>
                </div>
                <div style="position: absolute; bottom: 5px; right: 5px; background: var(--primary); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid var(--bg-dark);">
                    <i data-lucide="plus" style="width: 16px;"></i>
                </div>
                <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="handleProfileUpload(this)">
            </div>

            <h1 id="profile-name" style="font-size: 2rem; margin-bottom: 0.25rem;">User Name</h1>
            <p id="profile-email" class="text-muted" style="margin-bottom: 1.5rem;">user@example.com</p>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;">
                <div class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.02);">
                    <p style="font-size: 1.25rem; font-weight: 800; color: var(--primary);" id="stats-friends">0</p>
                    <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted);">FRIENDS</p>
                </div>
                <div class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.02);">
                    <p style="font-size: 1.25rem; font-weight: 800; color: var(--secondary);" id="stats-followers">0</p>
                    <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted);">FOLLOWERS</p>
                </div>
                <div class="glass-card" style="padding: 1rem; background: rgba(255,255,255,0.02);">
                    <p style="font-size: 1.25rem; font-weight: 800; color: #10b981;" id="stats-mutual">0</p>
                    <p style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted);">MUTUAL</p>
                </div>
            </div>

            <div style="text-align: left; display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem; color: var(--text-muted);">
                    <i data-lucide="map-pin" style="width: 18px;"></i>
                    <span id="profile-location">Detecting...</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; color: var(--text-muted);">
                    <i data-lucide="calendar" style="width: 18px;"></i>
                    <span>Member since <span id="profile-joined">April 2026</span></span>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; border-radius: 12px;" onclick="openEditModal()">Edit Profile Settings</button>
        </div>
      </div>

      <!-- Edit Modal -->
      <div id="edit-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 1.5rem;">
        <div class="glass-card" style="width: 100%; max-width: 400px; border: 1px solid var(--primary);">
            <h2 style="margin-bottom: 1.5rem;">Update Profile</h2>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.5rem;">DISPLAY NAME</label>
                <input type="text" id="edit-name" class="search-input" style="padding: 1rem; border-radius: 12px;">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-primary" style="flex: 1;" onclick="saveProfileChanges()">Save Changes</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
      </div>
    </template>

    <template id="view-notifications">
      <div class="fade-in">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Alerts</h1>
            <button id="clear-notifications" class="btn btn-secondary" style="padding: 0.4rem 1rem; font-size: 0.8rem;">Clear All</button>
        </div>
        <div id="notifications-list" style="display: flex; flex-direction: column; gap: 1rem;">
            <!-- Notifications injected here -->
        </div>
      </div>
    </template>

    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="module" src="/src/app.js?v=1.2.2"></script>
  </body>
</html>
